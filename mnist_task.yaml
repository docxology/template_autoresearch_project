task:
  id: mnist_small_neural_search
  name: small MNIST neural-network classification
  dataset_path: data/mnist_small.npz
  provenance_path: data/mnist_small_provenance.json
  seed: 20260525
  metric_name: test_accuracy
  metric_direction: maximize
  max_candidates: 4
  normalization: zero_one
baseline:
  id: nearest_centroid_baseline
  type: nearest_centroid
training_defaults:
  batch_size: 100
  epochs: 18
  learning_rate: 0.22
  learning_rate_decay: 0.995
  gradient_clip_norm: 5.0
  l2: 0.0001
diagnostics:
  calibration_bins: 10
  bootstrap_resamples: 1000
  bootstrap_seed_offset: 10003
  low_margin_threshold: 0.15
  high_confidence_threshold: 0.8
  coverage_thresholds:
    - 0.5
    - 0.6
    - 0.7
    - 0.8
    - 0.9
robustness_transforms:
  - id: identity
    type: identity
  - id: shift_right_1
    type: shift
    dx: 1
    dy: 0
  - id: shift_down_1
    type: shift
    dx: 0
    dy: 1
  - id: low_contrast_0_85
    type: contrast
    factor: 0.85
candidate_configs:
  - id: exp-softmax-linear
    title: "Softmax regression"
    model_type: softmax_regression
    seed: 101
    training:
      epochs: 20
      learning_rate: 0.30
  - id: exp-mlp-relu-32
    title: "One-hidden-layer ReLU MLP"
    model_type: mlp
    seed: 102
    hidden_sizes:
      - 32
    activation: relu
    training:
      epochs: 24
      learning_rate: 0.20
  - id: exp-tiny-patch-attention
    title: "Tiny patch-attention classifier"
    model_type: tiny_patch_transformer
    seed: 103
    patch_size: 7
    d_model: 32
    train_attention: false
    training:
      epochs: 24
      learning_rate: 0.24
  - id: exp-mlp-tanh-64
    title: "One-hidden-layer tanh MLP"
    model_type: mlp
    seed: 104
    hidden_sizes:
      - 64
    activation: tanh
    training:
      epochs: 22
      learning_rate: 0.16
  - id: exp-mlp-relu-64-deferred
    title: "Deferred wider ReLU MLP"
    model_type: mlp
    seed: 105
    hidden_sizes:
      - 64
    activation: relu
    training:
      epochs: 22
      learning_rate: 0.18
