enabled: true
strict: true
topic: "Deterministic bounded AutoResearch for a small MNIST neural-network task"
autonomy_level: proposal_only
budget:
  max_iterations: 4
  max_wall_clock_minutes: 20
  max_llm_calls: 0
  max_cost_usd: 0.0
edit_allowlist:
  - projects/templates/template_autoresearch_project/mnist_task.yaml
  - projects/templates/template_autoresearch_project/src/
  - projects/templates/template_autoresearch_project/manuscript/
metric_direction: maximize
grading:
  # Knobs for the readiness-benchmark auto-grade (consumed by src/writers._load_grading_settings).
  # min_accuracy_delta: the smallest ML improvement over baseline that counts as a real result.
  min_accuracy_delta: 0.005
  # core_artifacts: the artifacts that must be substantive for the readiness benchmark to pass.
  core_artifacts:
    - output/data/autoresearch_loop.json
    - output/data/autoresearch_plan.json
    - output/data/autoresearch_claims.json
    - output/data/autoresearch_stage_matrix.csv
    - output/data/ml_task_results.json
acceptance_policy: "Accepted ideas require local evidence links and human review."
quality_checks:
  - domain_profile
  - experiment_plan
  - pipeline_contracts
  - evidence_registry
  - artifact_manifest
  - thin_orchestrators
  - method_contracts
  - review_gates
  - benchmark_tasks
  - ai_disclosure
  - security_profile
security_profile:
  enabled: true
  mode: local_deterministic
  threat_model_frameworks:
    - STRIDE
    - MITRE_ATT&CK_T1195
  integrity_algorithm: sha256
  network_policy: default_offline
  external_signing: false
stage_gates:
  - Project Tests
  - Project Analysis
  - Output Validation
  - Copy Outputs
review_gates:
  - name: proposal_review
    required: true
  - name: evidence_review
    required: true
source_manifests:
  - output/reports/evidence_registry.json
  - manuscript/source_ledger.yaml
benchmark_tasks:
  - id: readiness-smoke
    description: "Confirm the deterministic AutoResearch loop emits graded readiness artifacts."
    grading_output: output/reports/benchmark_readiness_smoke.json
  - id: ml-loop-score
    description: "Grade bounded ML-loop metric improvement, budget compliance, and offline execution."
    grading_output: output/reports/ml_benchmark_score.json
disclosure_required: true
disclosure_text: "AI-assisted AutoResearch"
required_artifacts:
  - output/data/autoresearch_plan.json
  - output/data/autoresearch_loop.json
  - output/data/autoresearch_claims.json
  - output/data/autoresearch_stage_matrix.csv
