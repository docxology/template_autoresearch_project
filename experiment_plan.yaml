conditions:
  - name: nearest_centroid_baseline
    role: reference
    description: Classify each MNIST test image by nearest training-set class centroid.
  - name: bounded_neural_candidate_loop
    role: proposed
    description: Evaluate fixed softmax, MLP, and tiny patch-attention candidates under the iteration budget.
  - name: deferred_candidate_budget_check
    role: variant
    description: Leave candidates beyond the configured budget unevaluated and record them as deferred.
metrics:
  primary:
    name: test_accuracy
    direction: maximize
protocol: "Load the local balanced small MNIST subset, evaluate bounded numpy neural-network candidates without external calls or runtime downloads, select the highest test accuracy with deterministic parameter-count tie-breaking, then require readiness reports and evidence-linked claims to pass."
expected_figures:
  - fig:ml_candidate_scores
expected_tables:
  - tbl:autoresearch-loop
  - tbl:ml-candidate-ledger
baselines:
  - nearest_centroid_baseline
ablations:
  - deferred_candidate_budget_check
