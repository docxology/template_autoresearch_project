ideas:
  - id: idea-ml-loop
    title: "Bounded deterministic small MNIST neural-network loop"
    rationale: "A tractable AutoResearch exemplar needs a real local digit-classification task, objective metrics, neural candidates, transformer-style comparison, and a keep/reject/defer ledger."
    status: accepted
    evidence_links:
      - claim_id: rq2
        evidence_path: output/data/ml_task_results.json
        evidence_type: artifact
      - claim_id: rq5
        evidence_path: output/reports/ml_benchmark_score.json
        evidence_type: artifact
    candidates:
      - id: exp-softmax-linear
        title: "Softmax regression"
        status: proposed
        metric_name: test_accuracy
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/mnist_task.yaml
          - projects/templates/template_autoresearch_project/src/ml_task.py
        expected_artifacts:
          - output/data/mnist_task_config.json
          - output/data/ml_task_results.json
          - output/data/ml_candidate_ledger.json
      - id: exp-mlp-relu-32
        title: "One-hidden-layer ReLU MLP"
        status: proposed
        metric_name: test_accuracy
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/mnist_task.yaml
          - projects/templates/template_autoresearch_project/src/ml_task.py
        expected_artifacts:
          - output/data/mnist_task_config.json
          - output/data/ml_task_results.json
          - output/data/ml_candidate_ledger.json
      - id: exp-tiny-patch-attention
        title: "Tiny patch-attention classifier"
        status: proposed
        metric_name: test_accuracy
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/mnist_task.yaml
          - projects/templates/template_autoresearch_project/src/ml_task.py
        expected_artifacts:
          - output/data/mnist_task_config.json
          - output/data/ml_task_results.json
          - output/data/ml_candidate_ledger.json
          - output/data/ml_confusion_matrix.csv
          - output/figures/ml_candidate_scores.png
      - id: exp-mlp-tanh-64
        title: "One-hidden-layer tanh MLP"
        status: proposed
        metric_name: test_accuracy
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/mnist_task.yaml
          - projects/templates/template_autoresearch_project/src/ml_task.py
        expected_artifacts:
          - output/data/ml_task_results.json
          - output/data/ml_candidate_ledger.json
      - id: exp-mlp-relu-64-deferred
        title: "Deferred wider ReLU MLP"
        status: proposed
        metric_name: test_accuracy
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/mnist_task.yaml
          - projects/templates/template_autoresearch_project/src/ml_task.py
        expected_artifacts:
          - output/data/ml_task_results.json
          - output/data/ml_candidate_ledger.json
  - id: idea-contract-ledgers
    title: "File-backed proposal ledgers"
    rationale: "Bounded research loops need replayable proposal state."
    status: accepted
    evidence_links:
      - claim_id: idea-contract-ledgers
        evidence_path: output/reports/evidence_registry.json
        evidence_type: artifact
    candidates:
      - id: exp-ledger-snapshot
        status: deferred
        metric_name: readiness_valid
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/src/loop.py
        expected_artifacts:
          - output/data/idea_ledger.json
          - output/data/run_ledger.json
  - id: idea-autonomous-execution
    title: "Autonomous generated-code execution"
    rationale: "Executing LLM-written code is intentionally outside the safe public default."
    status: rejected
    evidence_links: []
    candidates: []
  - id: idea-benchmark-smoke
    title: "Benchmark-style readiness scoring"
    rationale: "A small grading artifact demonstrates benchmark wiring without external services."
    status: deferred
    evidence_links: []
    candidates:
      - id: exp-benchmark-smoke
        status: deferred
        metric_name: benchmark_status
        metric_direction: maximize
        touched_paths:
          - projects/templates/template_autoresearch_project/src/reports.py
        expected_artifacts:
          - output/data/benchmark_scores.json
